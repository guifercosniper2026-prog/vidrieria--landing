        }

        function mostrar() {
            document.getElementById('img-lb').src = current[idx].src;
            document.getElementById('caption').innerText = current[idx].name;
        }

        function cambiar(n) {
            idx += n;
            if (idx >= current.length) idx = 0;
            if (idx < 0) idx = current.length - 1;
            mostrar();
        }
